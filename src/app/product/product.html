<table class="table">
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Selected</th>
    <th>Action</th> </tr>
  </thead>
  <tbody>
  @for(p of products ; track p.id){
  <tr>
    <td>{{p.id}}</td>
    <td>{{p.name}}</td>
    <td>{{p.price}}</td>
    <td>{{p.selected}}</td>
    <td>
      @if(p.selected) {
      <i class="bi bi-check-circle text-success"></i>
      } @else {
      <i class="bi bi-circle"></i>
      }
    </td>
    <td>
      <button (click)="handleDelete(p)" class="btn btn-danger btn-sm">
        <i class="bi bi-trash"></i>
      </button>
    </td>
  </tr>
  }
  </tbody>
</table>
